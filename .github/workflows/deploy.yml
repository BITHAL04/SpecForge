name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
      - name: Backend tests
        working-directory: apps/api
        run: uv sync && uv run pytest

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Frontend build
        run: |
          pnpm install
          pnpm --filter @specforge/web build

  deploy-backend:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    steps:
      - name: Trigger Railway deploy hook
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK_URL" ]; then
            echo "RAILWAY_DEPLOY_HOOK_URL is not set; skipping backend deployment."
            exit 0
          fi
          curl -fsSL -X POST "$RAILWAY_DEPLOY_HOOK_URL"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not set; skipping frontend deployment."
            exit 0
          fi
          curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK_URL"